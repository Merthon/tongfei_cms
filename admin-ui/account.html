<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>账号管理 - TONFY CMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #343a40; }
    </style>
</head>
<body>
    <div class="d-flex">
        <div id="sidebar-container" class="sidebar text-white" style="width: 250px;"></div>
        <div class="flex-grow-1">
            <div id="header-container"></div>

            <div class="p-4 row">
                <div class="col-md-4">
                    <div class="bg-white p-4 rounded shadow-sm">
                        <h5 class="text-primary border-bottom pb-2 mb-3">✨ 新建子账号</h5>
                        <form id="createEditorForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">登录账号</label>
                                <input type="text" id="newUsername" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">初始密码</label>
                                <input type="password" id="newPassword" class="form-control" required>
                            </div>
                            <div class="mb-4 p-2 border rounded bg-light small">
                                <label class="fw-bold d-block mb-2">分配权限：</label>
                                <div class="form-check"><input class="form-check-input" type="checkbox" name="modules" value="news"> 新闻模块</div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" name="modules" value="product"> 产品与行业</div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" name="modules" value="job"> 招聘管理</div>
                                <div class="form-check"><input class="form-check-input" type="checkbox" name="modules" value="banner"> 首页 Banner</div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">立即创建</button>
                        </form>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="bg-white p-4 rounded shadow-sm">
                        <h5 class="text-secondary border-bottom pb-2 mb-3">👥 已有账号管理</h5>
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>账号名</th>
                                    <th>拥有权限模块</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="accountTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">修改账号权限</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editAccountId">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-danger">重置密码 (不填则不修改)</label>
                        <input type="text" id="editPassword" class="form-control" placeholder="输入新密码">
                    </div>
                    <div class="mb-3 p-3 border rounded bg-light">
                        <label class="form-label fw-bold d-block mb-3">重新分配权限：</label>
                        <div class="form-check form-check-inline"><input class="form-check-input edit-chk" type="checkbox" value="news"> 新闻</div>
                        <div class="form-check form-check-inline"><input class="form-check-input edit-chk" type="checkbox" value="product"> 产品</div>
                        <div class="form-check form-check-inline"><input class="form-check-input edit-chk" type="checkbox" value="job"> 招聘</div>
                        <div class="form-check form-check-inline"><input class="form-check-input edit-chk" type="checkbox" value="banner"> Banner</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="submitEdit()">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/admin/common.js"></script>
    <script>
        initLayout('account');
        const token = localStorage.getItem('cms_token');

        // 页面加载时，获取并渲染表格
        loadAccountList();

        // ==========================================
        // 1. 获取账号列表
        // ==========================================
        async function loadAccountList() {
            try {
                const res = await fetch('/api/admin/account/list', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const users = await res.json();
                    let html = '';
                    users.forEach(u => {
                        html += `
                            <tr>
                                <td>${u.ID}</td>
                                <td class="fw-bold text-primary">${u.username}</td>
                                <td><span class="badge bg-info text-dark">${u.modules}</span></td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary me-2" onclick="openEditModal(${u.ID}, '${u.modules}')">编辑</button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteAccount(${u.ID}, '${u.username}')">删除</button>
                                </td>
                            </tr>
                        `;
                    });
                    document.getElementById('accountTableBody').innerHTML = html;
                }
            } catch (err) { console.error("加载列表失败", err); }
        }

        // ==========================================
        // 2. 创建账号
        // ==========================================
        document.getElementById('createEditorForm').addEventListener('submit', async function(e) {
            e.preventDefault(); 
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();
            
            const checkedBoxes = Array.from(document.querySelectorAll('input[name="modules"]:checked')).map(cb => cb.value);
            if (checkedBoxes.length === 0) return alert('请至少勾选一个权限！');

            try {
                const res = await fetch('/api/admin/account/create_editor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ username, password, modules: checkedBoxes.join(',') })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('账号创建成功！');
                    this.reset();
                    loadAccountList(); // 创建完立马刷新表格
                } else { alert('创建失败: ' + (data.error || '未知错误')); }
            } catch (err) { alert('网络异常'); }
        });

        // ==========================================
        // 3. 删除账号
        // ==========================================
        async function deleteAccount(id, name) {
            if (!confirm(`💣 危险操作：确定要永久删除员工 [ ${name} ] 吗？`)) return;
            try {
                const res = await fetch(`/api/admin/account/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    loadAccountList(); // 删完立马刷新表格
                } else {
                    const data = await res.json();
                    alert('删除失败: ' + data.error);
                }
            } catch (err) { alert('网络异常'); }
        }

        // ==========================================
        // 4. 打开编辑弹窗
        // ==========================================
        const editModal = new bootstrap.Modal(document.getElementById('editModal'));
        function openEditModal(id, currentModules) {
            document.getElementById('editAccountId').value = id;
            document.getElementById('editPassword').value = ''; // 每次打开密码框清空
            
            // 还原勾选状态
            document.querySelectorAll('.edit-chk').forEach(chk => {
                chk.checked = currentModules.includes(chk.value);
            });
            editModal.show();
        }

        // ==========================================
        // 5. 提交修改
        // ==========================================
        async function submitEdit() {
            const id = document.getElementById('editAccountId').value;
            const password = document.getElementById('editPassword').value.trim();
            const checkedBoxes = Array.from(document.querySelectorAll('.edit-chk:checked')).map(cb => cb.value);
            if (checkedBoxes.length === 0) return alert('不能清空所有权限，请至少保留一个！');

            try {
                const res = await fetch(`/api/admin/account/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ password, modules: checkedBoxes.join(',') })
                });
                if (res.ok) {
                    editModal.hide();
                    loadAccountList(); // 改完立马刷新表格
                } else {
                    const data = await res.json();
                    alert('修改失败: ' + data.error);
                }
            } catch (err) { alert('网络异常'); }
        }
    </script>
</body>
</html>
