<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同飞后台管理系统 - 新闻管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">TONFY CMS - 后台管理</span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">退出登录</button>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>新闻列表</h4>
        <button class="btn btn-success" onclick="openAddModal()">+ 发布新新闻</button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>封面</th>
                        <th>标题</th>
                        <th>发布日期</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="news-tbody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="newsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新闻编辑</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="newsForm">
                    <div class="mb-3">
                        <label class="form-label">新闻标题</label>
                        <input type="text" class="form-control" id="n-title" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">发布日期 (格式如 2026-03-24)</label>
                        <input type="text" class="form-control" id="n-date" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">副标题 / 简述</label>
                        <textarea class="form-control" id="n-desc" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">上传封面图</label>
                        <input class="form-control" type="file" id="n-file" accept="image/*">
                        <input type="hidden" id="n-image-url">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新闻正文 (输入 HTML 源码)</label>
                        <textarea class="form-control" id="n-content" rows="6" placeholder="<p>在这里输入正文内容...</p>"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveNews()">保存并发布</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 1. 页面加载时的权限拦截
    const token = localStorage.getItem('cms_token');
    if (!token) {
        alert('未登录或登录已过期，请重新登录！');
        window.location.href = '/admin/login.html';
    }

    // 弹窗实例
    const newsModal = new bootstrap.Modal(document.getElementById('newsModal'));

    // 页面加载完成后，拉取新闻列表
    document.addEventListener('DOMContentLoaded', loadNewsList);

    // 2. 获取新闻列表 (公开接口，不需要 Token)
    async function loadNewsList() {
        try {
            const res = await fetch('/api/news');
            const data = await res.json();
            
            const tbody = document.getElementById('news-tbody');
            tbody.innerHTML = ''; // 清空表格
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">暂无新闻数据</td></tr>';
                return;
            }

            data.forEach(news => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${news.ID}</td>
                    <td><img src="${news.image}" alt="封面" style="height: 40px; border-radius: 4px; object-fit: cover;"></td>
                    <td class="fw-bold">${news.title}</td>
                    <td>${news.date}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteNews(${news.ID})">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error('获取列表失败:', error);
        }
    }

    // 打开添加弹窗并清空表单
    function openAddModal() {
        document.getElementById('newsForm').reset();
        document.getElementById('n-image-url').value = '';
        newsModal.show();
    }

    // 3. 核心：保存新闻 (包含先传图片，再存数据)
    async function saveNews() {
        const fileInput = document.getElementById('n-file');
        let imageUrl = document.getElementById('n-image-url').value;

        // 如果用户选择了新文件，先调用上传接口
        if (fileInput.files.length > 0) {
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                // 【划重点】请求受保护的上传接口，必须带上 Token
                const uploadRes = await fetch('/api/admin/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    },
                    body: formData
                });
                
                if (!uploadRes.ok) throw new Error('图片上传失败');
                
                const uploadData = await uploadRes.json();
                imageUrl = uploadData.url; // 拿到后端返回的图片路径
            } catch (error) {
                alert(error.message);
                return;
            }
        }

        // 组装新闻数据
        const newsData = {
            title: document.getElementById('n-title').value,
            date: document.getElementById('n-date').value,
            description: document.getElementById('n-desc').value,
            image: imageUrl,
            content: document.getElementById('n-content').value
        };

        // 发送保存新闻请求 (受 JWT 保护)
        try {
            const res = await fetch('/api/admin/news', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token // 【划重点】带上身份令牌
                },
                body: JSON.stringify(newsData)
            });

            if (res.ok) {
                alert('发布成功！');
                newsModal.hide(); // 关闭弹窗
                loadNewsList();   // 刷新列表
            } else {
                const errData = await res.json();
                alert('发布失败: ' + errData.error);
            }
        } catch (error) {
            console.error('保存报错:', error);
        }
    }

    // 4. 删除新闻 (受 JWT 保护)
    async function deleteNews(id) {
        if (!confirm('确定要删除这条新闻吗？')) return;

        try {
            const res = await fetch(`/api/admin/news/${id}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + token // 【划重点】带上身份令牌
                }
            });

            if (res.ok) {
                loadNewsList(); // 刷新列表
            } else {
                alert('删除失败，可能没有权限！');
            }
        } catch (error) {
            console.error('删除报错:', error);
        }
    }

    // 退出登录
    function logout() {
        localStorage.removeItem('cms_token');
        window.location.href = '/admin/login.html';
    }
</script>
</body>
</html>
