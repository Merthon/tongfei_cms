<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>同飞后台 - 首页</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="d-flex" style="min-height: 100vh">
      <div id="sidebar-container" class="bg-dark" style="width: 250px; flex-shrink: 0"></div>

      <div class="flex-grow-1 d-flex flex-column">
        <div id="header-container"></div>

        <div class="container-fluid p-4">
          <h3 class="mb-4">👋 欢迎回来，管理员！</h3>

          <div class="row g-4">
            
            <div class="col-md-3">
              <div class="card shadow-sm border-0 bg-primary text-white h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center p-4 text-center">
                  <h5 class="card-title">新闻中心</h5>
                  <p class="card-text opacity-75">发布和管理公司最新动态</p>
                  <a href="/admin/news.html" class="btn btn-light btn-sm mt-2 fw-bold text-primary">前往管理 &rarr;</a>
                </div>
              </div>
            </div>

            <div class="col-md-3">
              <div class="card shadow-sm border-0 bg-info text-white h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center p-4 text-center">
                  <h5 class="card-title">行业分类</h5>
                  <p class="card-text opacity-75">管理行业菜单与Banner文案</p>
                  <a href="/admin/category.html" class="btn btn-light btn-sm mt-2 fw-bold text-info">前往管理 &rarr;</a>
                </div>
              </div>
            </div>

            <div class="col-md-3">
              <div class="card shadow-sm border-0 bg-success text-white h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center p-4 text-center">
                  <h5 class="card-title">产品图册</h5>
                  <p class="card-text opacity-75">维护核心产品线数据</p>
                  <a href="/admin/product.html" class="btn btn-light btn-sm mt-2 fw-bold text-success">前往管理 &rarr;</a>
                </div>
              </div>
            </div>

            <div class="col-md-3">
              <div class="card shadow-sm border-0 bg-danger text-white h-100">
                <div class="card-body d-flex flex-column justify-content-center align-items-center p-4 text-center">
                  <h5 class="card-title">招聘与职位</h5>
                  <p class="card-text opacity-75">发布职位与处理候选人简历</p>
                  <a href="/admin/job.html" class="btn btn-light btn-sm mt-2 fw-bold text-danger">前往管理 &rarr;</a>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./common.js"></script>

    <script>
      // 告诉 common.js，现在要把 "index" (后台首页) 这个菜单高亮！
      initLayout('index');
    </script>
  </body>
</html>
