<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>同飞后台 - 新闻管理</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/@wangeditor/editor@latest/dist/css/style.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="d-flex" style="min-height: 100vh">
      <div id="sidebar-container" class="bg-dark" style="width: 250px; flex-shrink: 0"></div>

      <div class="flex-grow-1 d-flex flex-column">
        <div id="header-container"></div>

        <div class="container-fluid p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">新闻列表</h4>
            <button class="btn btn-success" onclick="openAddModal()">+ 发布新闻</button>
          </div>

          <div class="card shadow-sm border-0">
            <div class="card-body p-0">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th class="ps-3">ID</th>
                    <th>封面</th>
                    <th>标题</th>
                    <th>发布日期</th>
                    <th class="pe-3">操作</th>
                  </tr>
                </thead>
                <tbody id="news-tbody"></tbody>
              </table>
            </div>
            <div class="card-footer bg-white d-flex justify-content-end py-3 border-top-0">
              <ul class="pagination mb-0" id="admin-pagination"></ul>
            </div>
          </div>

          <div class="modal fade" id="newsModal" tabindex="-1">
            <div class="modal-dialog modal-xl">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="modal-title-text">新闻编辑</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                  <form id="newsForm">
                    <input type="hidden" id="n-id" />

                    <div class="row">
                      <div class="col-md-8 mb-3">
                        <label class="form-label text-muted small fw-bold">新闻标题</label>
                        <input type="text" class="form-control" id="n-title" required />
                      </div>
                      <div class="col-md-4 mb-3">
                        <label class="form-label text-muted small fw-bold">发布日期</label>
                        <input
                          type="text"
                          class="form-control"
                          id="n-date"
                          placeholder="例如: 2026-03-24"
                          required
                        />
                      </div>
                    </div>
                    <div class="mb-3">
                      <label class="form-label text-muted small fw-bold">副标题 / 简述</label>
                      <textarea class="form-control" id="n-desc" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                      <label class="form-label text-muted small fw-bold">
                        上传封面图 (自动压缩为 WebP)
                      </label>
                      <input class="form-control" type="file" id="n-file" accept="image/*" />
                      <input type="hidden" id="n-image-url" />
                    </div>
                    <div class="mb-3">
                      <label class="form-label text-muted small fw-bold">
                        新闻正文 (支持从 Word 复制粘贴)
                      </label>
                      <div style="border: 1px solid #ccc; border-radius: 4px; z-index: 100">
                        <div id="editor-toolbar" style="border-bottom: 1px solid #ccc"></div>
                        <div id="editor-container" style="height: 400px; overflow-y: hidden"></div>
                      </div>
                    </div>
                  </form>
                </div>
                <div class="modal-footer bg-light">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    取消
                  </button>
                  <button type="button" class="btn btn-primary px-4" onclick="saveNews()">
                    保存并发布
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@wangeditor/editor@latest/dist/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/compressorjs@1.2.1/dist/compressor.min.js"></script>
    <script src="./common.js"></script>

    <script>
      // 1. 启动左侧菜单和顶部导航 (高亮 news 模块)
      initLayout('news');

      // 全局变量声明
      let newsModal = null;
      let editor = null;
      let allAdminNews = [];
      let adminCurrentPage = 1;
      const adminItemsPerPage = 10;

      // 2. 页面加载完成后的初始化操作
      document.addEventListener('DOMContentLoaded', () => {
        // 安全初始化弹窗
        const modalEl = document.getElementById('newsModal');
        if (modalEl) newsModal = new bootstrap.Modal(modalEl);

        initWangEditor();
        initCoverUpload();
        loadNewsList();
      });

      // ================= 分页与列表渲染 =================
      async function loadNewsList() {
        try {
          const res = await fetch('/api/news');
          const data = await res.json();
          // 强制按日期倒序
          allAdminNews = data.sort((a, b) => new Date(b.date) - new Date(a.date));
          renderAdminPage(1);
        } catch (error) {
          console.error('获取列表失败:', error);
        }
      }

      function renderAdminPage(page) {
        adminCurrentPage = page;
        const tbody = document.getElementById('news-tbody');
        tbody.innerHTML = '';

        const start = (page - 1) * adminItemsPerPage;
        const pageData = allAdminNews.slice(start, start + adminItemsPerPage);

        if (pageData.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="5" class="text-center text-muted py-4">暂无新闻数据</td></tr>';
          renderAdminPagination();
          return;
        }

        pageData.forEach((news) => {
          // 兼容新老图片路径
          let imgUrl = news.image;
          if (imgUrl && imgUrl.startsWith('/uploads')) {
            imgUrl = imgUrl;
          }

          const tr = document.createElement('tr');
          tr.innerHTML = `
                <td class="ps-3 text-muted">#${news.ID}</td>
                <td><img src="${imgUrl}" style="height: 40px; width: 60px; border-radius: 4px; object-fit: cover; border: 1px solid #eee;"></td>
                <td class="fw-bold text-dark">${news.title}</td>
                <td class="text-secondary">${news.date}</td>
                <td class="pe-3">
                    <button class="btn btn-outline-primary btn-sm me-2 px-3" onclick="editNews(${news.ID})">编辑</button>
                    <button class="btn btn-outline-danger btn-sm px-3" onclick="deleteNews(${news.ID})">删除</button>
                </td>
            `;
          tbody.appendChild(tr);
        });
        renderAdminPagination();
      }

      function renderAdminPagination() {
        const totalPages = Math.ceil(allAdminNews.length / adminItemsPerPage);
        const pageContainer = document.getElementById('admin-pagination');
        let html = '';

        if (totalPages <= 1) {
          pageContainer.innerHTML = '';
          return;
        }

        html += `<li class="page-item ${adminCurrentPage === 1 ? 'disabled' : ''}">
                    <a class="page-link shadow-none" href="#" onclick="changeAdminPage(${adminCurrentPage - 1}, event)">上一页</a>
                 </li>`;

        for (let i = 1; i <= totalPages; i++) {
          html += `<li class="page-item ${adminCurrentPage === i ? 'active' : ''}">
                        <a class="page-link shadow-none" href="#" onclick="changeAdminPage(${i}, event)">${i}</a>
                     </li>`;
        }

        html += `<li class="page-item ${adminCurrentPage === totalPages ? 'disabled' : ''}">
                    <a class="page-link shadow-none" href="#" onclick="changeAdminPage(${adminCurrentPage + 1}, event)">下一页</a>
                 </li>`;
        pageContainer.innerHTML = html;
      }

      window.changeAdminPage = function (page, event) {
        if (event) event.preventDefault();
        const totalPages = Math.ceil(allAdminNews.length / adminItemsPerPage);
        if (page >= 1 && page <= totalPages) renderAdminPage(page);
      };

      // ================= 弹窗交互逻辑 =================
      function openAddModal() {
        document.getElementById('newsForm').reset();
        document.getElementById('n-id').value = '';
        document.getElementById('n-image-url').value = '';
        document.getElementById('modal-title-text').innerText = '发布新新闻';
        if (editor) editor.setHtml('<p><br></p>');
        if (newsModal) newsModal.show();
      }

      async function editNews(id) {
        try {
          const res = await fetch(`/api/news/${id}`);
          if (!res.ok) throw new Error('获取新闻详情失败');
          const news = await res.json();

          document.getElementById('n-id').value = news.ID;
          document.getElementById('n-title').value = news.title;
          document.getElementById('n-date').value = news.date;
          document.getElementById('n-desc').value = news.description || '';
          document.getElementById('n-image-url').value = news.image || '';

          document.getElementById('modal-title-text').innerText = '编辑新闻';
          if (editor) editor.setHtml(news.content || '<p><br></p>');
          if (newsModal) newsModal.show();
        } catch (error) {
          alert(error.message);
        }
      }

      // ================= 核心保存与删除 =================
      async function saveNews() {
        const id = document.getElementById('n-id').value;
        const imageUrl = document.getElementById('n-image-url').value;

        const newsData = {
          title: document.getElementById('n-title').value,
          date: document.getElementById('n-date').value,
          description: document.getElementById('n-desc').value,
          image: imageUrl,
          content: editor ? editor.getHtml() : '',
        };

        const method = id ? 'PUT' : 'POST';
        const url = id
          ? `/api/admin/news/${id}`
          : '/api/admin/news';

        try {
          const res = await fetch(url, {
            method: method,
            headers: {
              'Content-Type': 'application/json',
              Authorization: 'Bearer ' + localStorage.getItem('cms_token'),
            },
            body: JSON.stringify(newsData),
          });

          if (res.ok) {
            if (newsModal) newsModal.hide();
            loadNewsList(); // 重新拉取数据并刷新
          } else {
            const errData = await res.json();
            alert('保存失败: ' + (errData.error || '未知错误'));
          }
        } catch (error) {
          console.error('保存报错:', error);
          alert('网络请求失败');
        }
      }

      async function deleteNews(id) {
        if (!confirm('确定要彻底删除这条新闻吗？')) return;
        try {
          const res = await fetch(`/api/admin/news/${id}`, {
            method: 'DELETE',
            headers: { Authorization: 'Bearer ' + localStorage.getItem('cms_token') },
          });
          if (res.ok) {
            loadNewsList();
          } else {
            alert('删除失败，可能没有权限！');
          }
        } catch (error) {
          console.error('删除报错:', error);
        }
      }

      // ================= 图片处理与编辑器 =================
      function initCoverUpload() {
        document.getElementById('n-file').addEventListener('change', function (e) {
          const file = e.target.files[0];
          if (!file) return;

          e.target.disabled = true; // 防抖
          new Compressor(file, {
            quality: 0.8,
            mimeType: 'image/webp',
            success(result) {
              const formData = new FormData();
              const newName = file.name.replace(/\.[^/.]+$/, '') + '.webp';
              formData.append('file', result, newName);

              fetch('/api/admin/upload', {
                method: 'POST',
                headers: { Authorization: 'Bearer ' + localStorage.getItem('cms_token') },
                body: formData,
              })
                .then((res) => res.json())
                .then((data) => {
                  document.getElementById('n-image-url').value = data.url;
                  console.log('封面已静默上传:', data.url);
                })
                .catch((err) => alert('封面图上传失败：' + err.message))
                .finally(() => (e.target.disabled = false));
            },
            error(err) {
              console.error('封面压缩失败:', err.message);
              e.target.disabled = false;
            },
          });
        });
      }

      function initWangEditor() {
        const { createEditor, createToolbar } = window.wangEditor;
        editor = createEditor({
          selector: '#editor-container',
          html: '<p><br></p>',
          config: {
            placeholder: '在此输入正文，或直接从 Word 复制粘贴过来...',
            MENU_CONF: {
              uploadImage: {
                customUpload(file, insertFn) {
                  new Compressor(file, {
                    quality: 0.8,
                    mimeType: 'image/webp',
                    success(result) {
                      const formData = new FormData();
                      const newName = file.name.replace(/\.[^/.]+$/, '') + '.webp';
                      formData.append('file', result, newName);

                      fetch('/api/admin/upload', {
                        method: 'POST',
                        headers: { Authorization: 'Bearer ' + localStorage.getItem('cms_token') },
                        body: formData,
                      })
                        .then((res) => res.json())
                        .then((data) => {
                          // 兼容处理：拼接完整后端地址插入到编辑器中
                          const fullUrl =  data.url;
                          insertFn(fullUrl, '图片', fullUrl);
                        })
                        .catch((err) => alert('正文图片上传失败：' + err.message));
                    },
                  });
                },
              },
            },
          },
          mode: 'default',
        });

        createToolbar({
          editor,
          selector: '#editor-toolbar',
          mode: 'default',
        });
      }
    </script>
  </body>
</html>
